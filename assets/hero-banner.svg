<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="940" cy="180" r="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="210" cy="300" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="termBg" x1="660" y1="60" x2="660" y2="365" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#181f30"/>
      <stop offset="100%" stop-color="#141a29"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#glow1)"/>
  <rect width="1200" height="400" fill="url(#glow2)"/>

  <g transform="translate(80, 110)">
    <rect x="0" y="0" width="52" height="52" rx="12" fill="#22d3ee" opacity="0.12"/>
    <text x="26" y="35" font-family="SF Mono, Menlo, Consolas, monospace" font-size="28" fill="#67e8f9" text-anchor="middle" font-weight="600">&gt;_</text>

    <text x="66" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" fill="#f8fafc" font-weight="700" letter-spacing="-0.5">appstore</text>
    <text x="66" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#64748b" font-weight="500" letter-spacing="3">CLI</text>
  </g>

  <text x="80" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" fill="#94a3b8" font-weight="400">
    App Store Worker endpoints from terminal.
  </text>
  <text x="80" y="236" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" fill="#94a3b8" font-weight="400">
    Multi-auth. Scriptable. CI-friendly.
  </text>

  <g transform="translate(80, 268)">
    <rect x="0" y="0" width="102" height="28" rx="14" fill="#22d3ee" opacity="0.1" stroke="#22d3ee" stroke-opacity="0.2" stroke-width="1"/>
    <text x="51" y="18" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#67e8f9" text-anchor="middle" font-weight="500">Go CLI</text>

    <rect x="112" y="0" width="126" height="28" rx="14" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1"/>
    <text x="175" y="18" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#a5b4fc" text-anchor="middle" font-weight="500">access_token</text>

    <rect x="248" y="0" width="108" height="28" rx="14" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-opacity="0.2" stroke-width="1"/>
    <text x="302" y="18" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#34d399" text-anchor="middle" font-weight="500">JSON output</text>
  </g>

  <line x1="80" y1="320" x2="440" y2="320" stroke="#1e293b" stroke-width="1"/>
  <text x="80" y="348" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#475569">aso/appstore_cli</text>

  <g transform="translate(500, 40)">
    <rect x="0" y="0" width="640" height="345" rx="12" fill="#1f2937"/>
    <rect x="1" y="1" width="638" height="343" rx="11" fill="url(#termBg)"/>

    <rect x="1" y="1" width="638" height="36" rx="11" fill="#1d2433"/>
    <rect x="1" y="26" width="638" height="11" fill="#1d2433"/>
    <circle cx="22" cy="19" r="6" fill="#ff5f57"/>
    <circle cx="42" cy="19" r="6" fill="#febc2e"/>
    <circle cx="62" cy="19" r="6" fill="#28c840"/>
    <text x="320" y="23" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12" fill="#64748b" text-anchor="middle">appstore — zsh</text>
    <line x1="1" y1="37" x2="639" y2="37" stroke="#2d3548" stroke-width="0.5"/>

    <g transform="translate(24, 58)">
      <text y="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13">
        <tspan fill="#6b7280">$</tspan>
        <tspan fill="#e2e8f0"> appstore auth list</tspan>
      </text>

      <text y="24" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5">
        <tspan fill="#34d399">*</tspan>
        <tspan fill="#94a3b8"> prod (access_token)</tspan>
      </text>
      <text y="44" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5">
        <tspan fill="#94a3b8">  admin (access_token)</tspan>
      </text>

      <text y="78" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13">
        <tspan fill="#6b7280">$</tspan>
        <tspan fill="#e2e8f0"> appstore search </tspan>
        <tspan fill="#fbbf24">--keyword</tspan>
        <tspan fill="#e2e8f0"> notes </tspan>
        <tspan fill="#fbbf24">--storefront</tspan>
        <tspan fill="#e2e8f0"> us</tspan>
      </text>

      <text y="102" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94a3b8">{</text>
      <text y="120" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" xml:space="preserve"><tspan fill="#94a3b8">  "</tspan><tspan fill="#7dd3fc">results</tspan><tspan fill="#94a3b8">": {</tspan></text>
      <text y="138" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" xml:space="preserve"><tspan fill="#94a3b8">    "</tspan><tspan fill="#7dd3fc">searchResult</tspan><tspan fill="#94a3b8">": { ... }</tspan></text>
      <text y="156" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" xml:space="preserve"><tspan fill="#94a3b8">  }</tspan></text>
      <text y="174" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94a3b8">}</text>

      <text y="212" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13">
        <tspan fill="#6b7280">$</tspan>
        <tspan fill="#e2e8f0"> appstore hints </tspan>
        <tspan fill="#fbbf24">--term</tspan>
        <tspan fill="#e2e8f0"> photo</tspan>
      </text>

      <text y="236" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94a3b8">[ "photo editor", "photo collage", "photo blur" ]</text>
    </g>
  </g>
</svg>
